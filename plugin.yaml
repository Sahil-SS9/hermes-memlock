name: memlock
version: "0.2.0"
description: "MemLock — re-asserts pinned standing instructions after context compaction. Detects compaction via SUMMARY_PREFIX scan, audits which pinned anchors survived, rehydrates casualties. Supports keyword and windowed semantic detection, on-drift and always inject modes."
author: Sahil Saghir (KENSEI)
hooks:
  - pre_llm_call
  - on_session_start
  - on_session_end
